spring.application.name=atalaya

server.port=${PORT:8080}

logging.pattern.dateformat=hh:mm
spring.main.banner-mode=off
spring.thymeleaf.cache=false

# Para Render/Aiven, configurar estas variables de entorno:
# DB_URL=jdbc:mysql://mysql-3a00e67e-alecr0731-0055.l.aivencloud.com:21023/defaultdb?ssl-mode=REQUIRED&allowPublicKeyRetrieval=true
# DB_USERNAME=avnadmin
# DB_PASSWORD=...
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/atalaya}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:${ATALAYA_DB_PASSWORD:}}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
