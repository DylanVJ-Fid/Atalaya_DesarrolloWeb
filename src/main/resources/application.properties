spring.application.name=atalaya

server.port=8080

# Se define el formato de despliegue de fecha/hora en el log
logging.pattern.dateformat=hh:mm

# Para eliminar el banner de Spring al inicio
spring.main.banner-mode=off

# Para evitar el uso de cache en desarrollo
spring.thymeleaf.cache=false

# Conexión a la BD MySQL en Aiven
spring.datasource.url=spring.datasource.url=jdbc:mysql://mysql-3a00e67e-alecr0731-0055.l.aivencloud.com:21023/defaultdb?sslMode=REQUIRED&allowPublicKeyRetrieval=true


# Usuario y contraseña
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}

# Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Manejo de la base de datos
spring.jpa.hibernate.ddl-auto=update

# Mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE