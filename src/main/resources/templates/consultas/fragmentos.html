<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <body>

        <section th:fragment="consultas" class="p-3">
            <div class="card">
                <div class="card-header">
                    <h4>Consulta de Productos</h4>
                </div>

                <div class="card-body">
                    <form th:action="@{/consultas/consultaDerivada}" method="post" class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label>Precio inferior</label>
                            <input type="number"
                                   name="precioInf"
                                   class="form-control"
                                   min="0"
                                   step="0.01"
                                   th:value="${precioInf}"/>
                        </div>

                        <div class="col-md-4">
                            <label>Precio superior</label>
                            <input type="number"
                                   name="precioSup"
                                   class="form-control"
                                   min="0"
                                   step="0.01"
                                   th:value="${precioSup}"/>
                        </div>

                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary">
                                Buscar
                            </button>
                            <a th:href="@{/consultas/listado}" class="btn btn-secondary">
                                Limpiar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section th:fragment="tabs" class="py-3 mb-4">
            <div class="d-flex justify-content-center px-5">
                <ul class="nav nav-underline">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/producto}">
                            Todas
                        </a>
                    </li>

                    <li th:each="c : ${categorias}" class="nav-item">
                        <a class="nav-link"
                           th:href="@{/producto/consultas/{id}(id=${c.idCategoria})}">
                            [[${c.descripcion}]]
                        </a>
                    </li>
                </ul>
            </div>
        </section>

        <section th:fragment="tarjetas" class="container py-4">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">

                <div th:each="p : ${productos}" class="col">
                    <div class="card h-100 shadow">

                        <div class="d-flex justify-content-center align-items-center bg-light p-3"
                             style="height: 200px;">
                            <img th:src="@{${p.rutaImagen}}"
                                 class="img-fluid"
                                 th:alt="${p.descripcion}"
                                 style="max-height: 100%; object-fit: contain;"/>
                        </div>

                        <div class="card-header bg-white">
                            <h5 class="card-title text-center text-truncate mb-0">
                                [[${p.descripcion}]]
                            </h5>
                        </div>

                        <div class="card-body d-flex flex-column">
                            <p class="card-text text-muted mb-auto text-truncate">
                                [[${p.detalle}]]
                            </p>
                        </div>

                        <div class="card-footer bg-white">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <div class="fw-bold">
                                    <span class="text-success h5">₡ [[${p.precio}]]</span>
                                </div>

                                <span th:if="${p.existencias > 0}"
                                      class="badge text-bg-success ms-2">
                                    [[${p.existencias}]] unidades
                                </span>

                                <span th:unless="${p.existencias > 0}"
                                      class="badge text-bg-danger ms-2">
                                    Agotado
                                </span>
                            </div>

                            <form th:if="${p.activo == true and p.existencias > 0}"
                                  th:action="@{/carrito/agregar/}+${p.idProducto}"
                                  method="post">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="fa-solid fa-cart-plus"></i>
                                    Agregar
                                </button>
                            </form>
                        </div>

                    </div>
                </div>

            </div>
        </section>

    </body>
</html>
