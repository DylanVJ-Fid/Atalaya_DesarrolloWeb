<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <section class="p-3">
            <div class="row p-3">
                <div class="col-md-9">
                    <div class="card p-2">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h4 class="mb-0">Carrito de Compras</h4>

                            <form th:if="${!carritoVacio}" th:action="@{/carrito/vaciar}" method="post">
                                <button type="submit" class="btn btn-outline-danger">
                                    <i class="fa-solid fa-trash-can"></i>
                                    Vaciar
                                </button>
                            </form>
                        </div>

                        <div class="card-body">
                            <div th:if="${detalles != null and !detalles.empty}">
                                <table class="table table-striped table-hover align-middle">
                                    <thead>
                                        <tr>
                                            <th>Producto</th>
                                            <th>Precio</th>
                                            <th>Cantidad</th>
                                            <th>Subtotal</th>
                                            <th>Acciones</th>
                                        </tr>
                                    </thead>

                                    <tbody>
                                        <tr th:each="d : ${detalles}">
                                            <td>
                                                <strong th:text="${d.producto.descripcion}"></strong>
                                                <div class="text-muted small" th:text="${d.producto.categoria.descripcion}"></div>
                                            </td>

                                            <td th:text="${d.producto.precio}"></td>

                                            <td style="max-width: 180px;">
                                                <div class="d-flex align-items-center gap-2">
                                                    <form th:action="@{/carrito/restar/}+${d.producto.idProducto}" method="post">
                                                        <button type="submit" class="btn btn-outline-secondary btn-sm">
                                                            <i class="fa-solid fa-minus"></i>
                                                        </button>
                                                    </form>

                                                    <form th:action="@{/carrito/actualizar}" method="post" class="d-flex">
                                                        <input type="hidden" name="idProducto" th:value="${d.producto.idProducto}"/>
                                                        <input type="number"
                                                               name="cantidad"
                                                               class="form-control form-control-sm text-center"
                                                               min="1"
                                                               th:max="${d.producto.existencias}"
                                                               th:value="${d.cantidad}"
                                                               onchange="this.form.submit()"/>
                                                    </form>

                                                    <form th:action="@{/carrito/sumar/}+${d.producto.idProducto}" method="post">
                                                        <button type="submit" class="btn btn-outline-secondary btn-sm">
                                                            <i class="fa-solid fa-plus"></i>
                                                        </button>
                                                    </form>
                                                </div>

                                                <span class="text-muted small">
                                                    Disponibles: <span th:text="${d.producto.existencias}"></span>
                                                </span>
                                            </td>

                                            <td th:text="${d.subtotal}"></td>

                                            <td>
                                                <form th:action="@{/carrito/eliminar/}+${d.producto.idProducto}" method="post">
                                                    <button type="submit" class="btn btn-danger btn-sm">
                                                        <i class="fa-solid fa-trash"></i>
                                                        Eliminar
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="text-center p-4" th:if="${detalles == null or detalles.empty}">
                                <h5>El carrito est&aacute; vac&iacute;o</h5>
                                <a th:href="@{/producto}" class="btn btn-primary mt-2">
                                    Ver Productos
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card text-center bg-success text-white mb-3">
                        <div class="card-body">
                            <h3>Total</h3>
                            <h4 th:text="${total}"></h4>
                            <p class="mb-0">
                                Productos: <span th:text="${cantidadProductos}"></span>
                            </p>
                        </div>
                    </div>

                    <a th:if="${!carritoVacio}"
                       th:href="@{/factura/checkout-carrito}"
                       class="btn btn-success w-100 mb-2">
                        <i class="fa-solid fa-credit-card"></i>
                        Comprar carrito
                    </a>

                    <a th:href="@{/producto}" class="btn btn-secondary w-100">
                        Seguir comprando
                    </a>
                </div>
            </div>
        </section>

        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
