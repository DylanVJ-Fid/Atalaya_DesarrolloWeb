<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <!-- Head General -->
    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <!-- Agregar Producto -->
        <section th:fragment="agregar">
            <div class='row py-4 mb-2 bg-light'>
                <div class='col-md-1'></div>
                <div class='col-md-3'>
                    <button type="button" class="btn btn-primary"
                            sec:authorize="hasRole('ROLE_ADMIN')"
                            data-bs-toggle="modal" data-bs-target="#agregarProductoModal">
                        + Agregar Producto
                    </button>
                </div>
            </div>

            <div class="modal fade" id="agregarProductoModal">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-header bg-info text-white">
                            <h5>Agregar Producto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <form th:action='@{/producto/guardar}' th:object='${producto}'
                              method="post" enctype="multipart/form-data">

                            <div class="modal-body">

                                <div class='mb-3'>
                                    <label>Categoría</label>
                                    <select name="categoria.idCategoria" class="form-select">
                                        <option th:each="c : ${categorias}"
                                                th:value="${c.idCategoria}"
                                                th:text="${c.descripcion}">
                                        </option>
                                    </select>
                                </div>

                                <div class='mb-3'>
                                    <label>Descripción</label>
                                    <input type="text" name='descripcion'
                                           class='form-control' required/>
                                </div>

                                <div class='mb-3'>
                                    <label>Detalle</label>
                                    <textarea name='detalle' class='form-control'></textarea>
                                </div>

                                <div class='mb-3'>
                                    <label>Precio</label>
                                    <input type="number" name='precio'
                                           class='form-control' min="0" required/>
                                </div>

                                <div class='mb-3'>
                                    <label>Existencias</label>
                                    <input type="number" name='existencias'
                                           class='form-control' min="0" required/>
                                </div>

                                <div class='mb-3'>
                                    <label>Activo</label>
                                    <input type="checkbox" name='activo'
                                           class='form-check-input'/>
                                </div>

                                <div class='mb-3'>
                                    <label>Imagen</label>
                                    <input type="file" name='imagenFile'
                                           class='form-control'/>
                                </div>

                            </div>

                            <div class="modal-footer">
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </section>


        <!-- Listado -->
        <section th:fragment="listado" class="p-3">
            <div class="card">
                <div class="card-header">
                    <h4>Listado de Productos</h4>
                </div>

                <div class="card-body">
                    <table class="table table-striped">

                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Descripción</th>
                                <th>Precio</th>
                                <th>Existencias</th>
                                <th>Categoría</th>
                                <th>Activo</th>
                                <th></th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="p : ${productos}">
                                <td th:text="${p.idProducto}"></td>
                                <td th:text="${p.descripcion}"></td>
                                <td th:text="${p.precio}"></td>
                                <td th:text="${p.existencias}"></td>
                                <td th:text="${p.categoria.descripcion}"></td>
                                <td th:text="${p.activo} ? 'Sí' : 'No'"></td>
                                <td>
                                    <a th:href="@{/producto/modifica/}+${p.idProducto}"
                                       class="btn btn-warning">Editar</a>

                                    <a th:href="@{/producto/detalle/}+${p.idProducto}"
                                       class="btn btn-info text-white">Detalle</a>

                                    <form th:if="${p.activo == true and p.existencias > 0}"
                                          th:action="@{/carrito/agregar/}+${p.idProducto}"
                                          method="post"
                                          style="display:inline;">
                                        <button type="submit" class="btn btn-success">
                                            <i class="fa-solid fa-cart-plus"></i>
                                            Agregar
                                        </button>
                                    </form>

                                    <form th:action="@{/producto/eliminar}" method="post" style="display:inline;">
                                        <input type="hidden" name="id" th:value="${p.idProducto}"/>
                                        <button type="submit" class="btn btn-danger">Eliminar</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>

                    </table>
                </div>
            </div>
        </section>


        <!-- Editar -->
        <section th:fragment="editar">
            <form th:action="@{/producto/guardar}"
                  th:object="${producto}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{idProducto}"/>

                <div class="mb-3">
                    <label>Descripción</label>
                    <input type="text" th:field="*{descripcion}" class="form-control"/>
                </div>

                <div class="mb-3">
                    <label>Precio</label>
                    <input type="number" th:field="*{precio}" class="form-control"/>
                </div>

                <button type="submit" class="btn btn-success">Guardar</button>
            </form>
        </section>


        <!-- Confirmar Eliminar -->
        <section th:fragment="confirmarEliminar">
            <div class="modal fade" id="confirmModal">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-header bg-warning">
                            <h5>Confirmar eliminación</h5>
                        </div>

                        <div class="modal-body">
                            ¿Desea eliminar este producto?
                        </div>

                        <div class="modal-footer">
                            <form th:action="@{/producto/eliminar}" method="post">
                                <input type="hidden" name="idProducto"/>
                                <button class="btn btn-danger">Eliminar</button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </section>

    </body>
</html>
