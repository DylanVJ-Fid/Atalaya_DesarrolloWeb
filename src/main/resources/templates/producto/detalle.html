<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div class="container mt-4">

            <h2>Detalle del Producto</h2>

            <p>Nombre: <span th:text="${producto.nombre}"></span></p>
            <p>Precio: <span th:text="${producto.precio}"></span></p>
            <p>Categoría: <span th:text="${producto.categoria.descripcion}"></span></p>

            <a class="btn btn-primary" th:href="@{/producto/listado}">Volver</a>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
