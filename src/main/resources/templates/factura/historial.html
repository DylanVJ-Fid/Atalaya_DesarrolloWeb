<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div class="container mt-4">

            <div class="card shadow" style="min-height:600px;">

                <div class="card-header">
                    <h3>Historial de Pedidos</h3>
                </div>

                <div class="card-body d-flex flex-column">

                    <p class="text-muted">
                        Consulta las compras realizadas.
                    </p>

                    <table class="table table-striped table-hover align-middle">

                        <thead class="table-dark">
                            <tr>
                                <th># Pedido</th>
                                <th>Fecha</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Detalle</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr th:each="f : ${facturas}">

                                <td th:text="${f.idFactura}"></td>

                                <td th:text="${#temporals.format(f.fecha,'dd/MM/yyyy HH:mm')}"></td>

                                <td th:text="'₡ ' + ${f.total}"></td>

                                <td>
                                    <span class="badge bg-success" th:text="${f.estado}"></span>
                                </td>

                                <td>

                                    <button type="button"
                                            class="btn btn-outline-primary btn-sm"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="'#detalleModal' + ${f.idFactura}">
                                        Ver
                                    </button>

                                    <div class="modal fade"
                                         th:id="'detalleModal' + ${f.idFactura}"
                                         tabindex="-1">

                                        <div class="modal-dialog">
                                            <div class="modal-content">

                                                <div class="modal-header">
                                                    <h5 class="modal-title">Detalle de la Compra</h5>

                                                    <button type="button"
                                                            class="btn-close"
                                                            data-bs-dismiss="modal"></button>
                                                </div>

                                                <div class="modal-body">

                                                    <p><strong>Pedido:</strong>
                                                        <span th:text="${f.idFactura}"></span></p>

                                                    <p><strong>Fecha:</strong>
                                                        <span th:text="${#temporals.format(f.fecha,'dd/MM/yyyy HH:mm')}"></span></p>

                                                    <p><strong>Total:</strong>
                                                        <span th:text="'₡ ' + ${f.total}"></span></p>

                                                    <p><strong>Estado:</strong>
                                                        <span class="badge bg-success"
                                                              th:text="${f.estado}"></span></p>

                                                    <div th:if="${f.ventas != null and !f.ventas.empty}">
                                                        <h6>Productos</h6>

                                                        <table class="table table-sm">
                                                            <thead>
                                                                <tr>
                                                                    <th>Producto</th>
                                                                    <th>Cantidad</th>
                                                                    <th>Precio</th>
                                                                    <th>Subtotal</th>
                                                                </tr>
                                                            </thead>

                                                            <tbody>
                                                                <tr th:each="v : ${f.ventas}">
                                                                    <td th:text="${v.producto != null ? v.producto.descripcion : 'Producto'}"></td>
                                                                    <td th:text="${v.cantidad}"></td>
                                                                    <td th:text="'₡ ' + ${v.precioHistorico}"></td>
                                                                    <td th:text="'₡ ' + ${v.subtotal}"></td>
                                                                </tr>
                                                            </tbody>
                                                        </table>
                                                    </div>

                                                </div>

                                                <div class="modal-footer">
                                                    <button class="btn btn-secondary"
                                                            data-bs-dismiss="modal">
                                                        Cerrar
                                                    </button>
                                                </div>

                                            </div>
                                        </div>

                                    </div>

                                </td>

                            </tr>

                            <tr th:if="${facturas == null or facturas.empty}">
                                <td colspan="5" class="text-center">
                                    No hay compras registradas.
                                </td>
                            </tr>

                        </tbody>

                    </table>

                    <div class="text-end mt-4">

                        <a th:href="@{/producto}" class="btn btn-secondary">
                            Volver
                        </a>

                        <form th:action="@{/factura/limpiar}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('¿Está seguro de eliminar todo el historial de compras?');">

                            <button type="submit" class="btn btn-danger">
                                Limpiar Historial
                            </button>

                        </form>

                        <button type="button"
                                class="btn btn-success"
                                onclick="window.print()">
                            Imprimir
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
