<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{general/fragmentos :: head}"></head>

<body class="bg-light">

<header th:replace="~{general/fragmentos :: header}"></header>

<div class="container mt-4 mb-5">
    <div class="card shadow">
        <div class="card-body">
            <div class="row">

                <div class="col-lg-7 border-end">

                    <h2>Resumen del carrito</h2>

                    <p class="text-muted">
                        Verifica los productos antes de confirmar la compra.
                    </p>

                    <table class="table table-striped align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="d : ${detalles}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <img th:src="@{${d.producto.rutaImagen}}"
                                         width="70"
                                         class="rounded me-3"
                                         alt="Producto">

                                    <span th:text="${d.producto.descripcion}"></span>
                                </div>
                            </td>

                            <td th:text="${d.cantidad}"></td>

                            <td th:text="'₡ ' + ${d.producto.precio}"></td>

                            <td th:text="'₡ ' + ${d.subtotal}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between">
                        <span>Productos</span>
                        <strong th:text="${cantidadProductos}">0</strong>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>Subtotal</span>
                        <strong th:text="'₡ ' + ${subtotal}">₡0</strong>
                    </div>

                    <div class="d-flex justify-content-between">
                        <span>IVA (13%)</span>
                        <strong th:text="'₡ ' + ${iva}">₡0</strong>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between">
                        <h4>Total</h4>
                        <h4 th:text="'₡ ' + ${total}">₡0</h4>
                    </div>

                </div>

                <div class="col-lg-5">

                    <h2>Informacion de compra</h2>

                    <p class="text-muted">
                        Completa la informacion para finalizar tu pedido.
                    </p>

                    <form th:action="@{/factura/guardar-carrito}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Nombre en la factura</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electronico</label>
                            <input type="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Numero de tarjeta</label>
                            <input type="text"
                                   class="form-control"
                                   placeholder="1234 5678 9012 3456"
                                   maxlength="19"
                                   required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Fecha de vencimiento</label>
                                <input type="text"
                                       class="form-control"
                                       placeholder="MM/AA"
                                       maxlength="5"
                                       required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">CVV</label>
                                <input type="password"
                                       class="form-control"
                                       maxlength="3"
                                       placeholder="123"
                                       required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Direccion</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="text-end mt-4">
                            <a th:href="@{/carrito/listado}" class="btn btn-secondary">
                                Volver al carrito
                            </a>

                            <button type="submit" class="btn btn-success">
                                <i class="fa-solid fa-credit-card"></i>
                                Confirmar Compra
                            </button>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>
</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>

</body>
</html>
