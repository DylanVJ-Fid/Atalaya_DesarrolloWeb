<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <body>

        <section th:fragment="agregar" class="container mt-4">
            <h2>Registro de Usuario</h2>

            <form th:action="@{/usuario/guardar}" th:object="${usuario}" method="post" class="row g-3">

                <input type="hidden" th:field="*{idUsuario}" />

                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Correo</label>
                    <input type="email" th:field="*{correo}" class="form-control" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Contraseña</label>
                    <input type="password" th:field="*{password}" class="form-control" required />
                </div>

                <div class="col-md-4">
                    <label class="form-label">Rol</label>
                    <select th:field="*{rol.idRol}" class="form-select" required>
                        <option value="">Seleccione un rol</option>
                        <option th:each="rol : ${roles}"
                                th:value="${rol.idRol}"
                                th:text="${rol.nombre}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" th:field="*{activo}" class="form-check-input" />
                        <label class="form-check-label">Activo</label>
                    </div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </section>

        <section th:fragment="listado" class="container mt-4">
            <h2>Lista de Usuarios</h2>

            <table class="table table-striped table-bordered mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.nombre}"></td>
                        <td th:text="${usuario.correo}"></td>
                        <td th:text="${usuario.rol != null ? usuario.rol.nombre : 'Sin rol'}"></td>
                        <td th:text="${usuario.activo ? 'Sí' : 'No'}"></td>
                        <td>
                            <a th:href="@{/usuario/modificar/{idUsuario}(idUsuario=${usuario.idUsuario})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/usuario/eliminar/{idUsuario}(idUsuario=${usuario.idUsuario})}"
                               class="btn btn-danger btn-sm">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

    </body>
</html>
